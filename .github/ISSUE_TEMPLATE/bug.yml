name: Bug report
description: Report a reproducible firmware problem
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What is wrong?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Boot the device
        2. Open Wi-Fi Scanner
        3. Return from Signal Monitor
        4. Start another scan
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Serial log or build output
      render: shell

  - type: input
    id: commit
    attributes:
      label: Commit or branch

  - type: textarea
    id: hardware
    attributes:
      label: Hardware details
      description: Board revision, connected modules, power source, and USB connection.
